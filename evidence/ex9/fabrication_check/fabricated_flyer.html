<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Haymarket Tap Event Flyer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #202124;
      background: #f5f1e8;
    }
    main {
      max-width: 720px;
      margin: 40px auto;
      padding: 32px;
      background: #ffffff;
      border: 1px solid #d8d0c0;
      border-radius: 8px;
    }
    h1 { margin-top: 0; font-size: 32px; }
    dl { display: grid; grid-template-columns: 180px 1fr; gap: 12px 20px; }
    dt { font-weight: 700; }
    dd { margin: 0; }
  </style>
</head>
<body>
  <main>
    <h1>Pub Night at <span data-testid="venue_name">Haymarket Tap</span></h1>
    <dl>
      <dt>Address</dt><dd data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</dd>
      <dt>Date</dt><dd data-testid="date">2026-04-25</dd>
      <dt>Time</dt><dd data-testid="time">19:30</dd>
      <dt>Party size</dt><dd data-testid="party_size">6</dd>
      <dt>Weather</dt><dd><span data-testid="condition">cloudy</span>, <span data-testid="temperature_c">12C</span></dd>
      <dt>Total cost</dt><dd data-testid="total_gbp">£9999</dd>
      <dt>Deposit required</dt><dd data-testid="deposit_required_gbp">£111</dd>
    </dl>
  </main>
</body>
</html>
