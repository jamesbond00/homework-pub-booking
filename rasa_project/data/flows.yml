flows:
  # ─────────────────────────────────────────────────────────────────
  # confirm_booking — the primary flow this homework uses.
  #
  # Entry: programmatic. RasaStructuredHalf POSTs:
  #   {"sender": "...", "message": "/confirm_booking",
  #    "metadata": {"booking": {"venue_id": ..., "party_size": 6, ...}}}
  #
  # Rasa's CompactLLMCommandGenerator parses "/confirm_booking" and
  # emits a StartFlow(confirm_booking) command. The flow then runs
  # ActionValidateBooking, which:
  #   1. reads tracker.latest_message.metadata.booking (our booking data)
  #   2. sets each slot
  #   3. validates against rules (party_size <= 8, deposit <= £300)
  #   4. sets validation_error slot (either a reason or None)
  #   5. if valid, also sets booking_reference
  #
  # The rest of the flow branches on validation_error to utter the
  # right response.
  #
  # The compatibility flows below intentionally reuse the same validation
  # policy. The Python bridge handles reverse handoff in Ex7, but keeping
  # these flow names available matches the assignment contract and gives
  # real Rasa runs stable programmatic entry points.
  # ─────────────────────────────────────────────────────────────────
  confirm_booking:
    description: >
      Confirm a pub booking after validating party size and deposit.
      Triggers when the user sends the programmatic command
      /confirm_booking with booking metadata.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  resume_from_loop:
    description: >
      Re-enter booking confirmation after the loop half has supplied a
      revised booking candidate in metadata.booking.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END

  request_research:
    description: >
      Validate the current booking candidate and expose rejection details
      for the Python bridge to send back to the loop half.
    steps:
      - id: validate
        action: action_validate_booking
        next:
          - if: "slots.validation_error is not null"
            then: rejected
          - else: confirmed
      - id: rejected
        action: utter_booking_rejected
        next: END
      - id: confirmed
        action: utter_booking_confirmed
        next: END
